<!doctype html>
<html data-theme="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/info/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calsel Agency</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored === "light" || stored === "dark" ? stored : "light";
          var root = document.documentElement;
          if (theme === "dark") {
            root.classList.add("dark");
          } else {
            root.classList.remove("dark");
          }
          root.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/info/assets/index-D-JRMoTn.js"></script>
    <link rel="stylesheet" crossorigin href="/info/assets/index-OSQhqueW.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
